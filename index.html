<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta property="og:title" content="Family Tree">
  <meta property="og:description" content="A privacy-first, offline-capable family tree editor. Encrypt and manage your family genealogy locally in your browser.">
  <meta property="og:url" content="https://mnurfaadil.github.io/family-tree/">
  <meta name="twitter:card" content="summary">

  <meta name="twitter:description" content="A privacy-first, offline-capable family tree editor. Encrypt and manage your family genealogy locally in your browser.">

  <script type="application/ld+json">

    "@context": "https://schema.org",

      "@type": "Offer",

    },

  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <title id="page-title">Family Tree</title>
  <link href="css/tailwind.css" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌳</text></svg>">
  <style>
    :root {
      /* Golden ratio spacing scale (base: 16px) */
      --ratio: 1.618;
      --space-xs: 0.382rem; /* ~6px */
      --space-sm: 0.618rem; /* ~10px */
      --space-md: 1rem;     /* 16px */
      --space-lg: 1.618rem; /* ~26px */
      --space-xl: 2.618rem; /* ~42px */
      --space-xxl: 4.236rem; /* ~68px */

      /* Colors */
      --bg-main: #090d16;
      --bg-sidebar: #0f172a;
      --bg-card: #1e293b;
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
    }
    #tree-container { width: 100%; height: 100%; min-height: 400px; overflow: hidden; position: relative; }
    #tree-container svg { width: 100%; height: 100%; }
    ::selection { background: #3b82f6; color: #fff; }

    /* Tooltip */
    .tree-tooltip {
      position: absolute; background: rgba(15, 23, 42, 0.95); color: #e2e8f0;
      padding: var(--space-sm) var(--space-md); font-size: 13px; pointer-events: none;
      z-index: 50; max-width: 280px; border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px; line-height: 1.6;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
    }

    /* Modal Overlay & Box */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      animation: fadeIn 0.2s ease-out;
    }
    .modal-box {
      background: var(--bg-card); padding: var(--space-lg); width: 92%; max-width: 480px;
      border: 1px solid var(--border-color);
      border-radius: 16px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Form Elements */
    .form-input, .form-select {
      width: 100%; padding: var(--space-sm) var(--space-md);
      border: 1px solid rgba(255, 255, 255, 0.15); background: rgba(15, 23, 42, 0.5);
      color: #f1f5f9; font-size: 14px; outline: none;
      border-radius: 8px;
      transition: all 0.2s ease;
    }
    .form-input:focus, .form-select:focus {
      border-color: #3b82f6; background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .btn {
      padding: 7px 16px; font-size: 12px; font-weight: 600; cursor: pointer;
      border: 1px solid transparent; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
      text-transform: uppercase; letter-spacing: 0.6px;
      border-radius: 6px;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.12);
    }
    .btn:active { transform: translateY(0) scale(0.98); }
    .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff; }
    .btn-success { background: linear-gradient(135deg, #10b981, #059669); color: #fff; }
    .btn-warning { background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; }
    .btn-ghost { background: transparent; color: #94a3b8; border-color: rgba(255, 255, 255, 0.1); }
    .btn-ghost:hover { background: rgba(255, 255, 255, 0.05); color: #e2e8f0; }
    .btn-merge { background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff; }

    /* Badge */
    .badge {
      display: inline-block; padding: 4px 10px;
      border-radius: 9999px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
    }
    .badge-blue { background: rgba(59, 130, 246, 0.1); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.3); }

    /* Lang buttons */
    .lang-btn {
      background: transparent; border: 1px solid rgba(255, 255, 255, 0.1); color: #94a3b8;
      padding: 6px 14px; cursor: pointer; font-size: 12px; font-weight: 700;
      line-height: 1.4; transition: all 0.2s;
      border-radius: 6px;
    }
    .lang-btn:hover { border-color: #3b82f6; color: #93c5fd; background: rgba(255, 255, 255, 0.03); }
    .lang-btn.active { background: rgba(59, 130, 246, 0.15); border-color: #3b82f6; color: #93c5fd; }

    /* Context Menu */
    .ctx-menu {
      position: fixed; z-index: 300; background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 6px; min-width: 170px;
      border-radius: 12px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
    }
    .ctx-menu-item {
      padding: 10px 16px; font-size: 13px; cursor: pointer; color: #e2e8f0;
      display: flex; align-items: center; gap: 8px; font-weight: 500;
      border-radius: 6px;
    }
    .ctx-menu-item:hover { background: rgba(255, 255, 255, 0.05); }
    .ctx-menu-item.danger { color: #f87171; }
    .ctx-menu-item.danger:hover { background: rgba(239, 68, 68, 0.15); }
    .ctx-menu-sep { height: 1px; background: rgba(255, 255, 255, 0.08); margin: 6px 4px; }

    .header-dropdown-btn {
      background: transparent; border: 1px solid rgba(255, 255, 255, 0.1); color: #94a3b8;
      padding: 8px 12px; cursor: pointer; font-size: 14px; line-height: 1;
      font-weight: 600; transition: all 0.2s;
      border-radius: 6px;
    }
    .header-dropdown-btn:hover { border-color: #3b82f6; color: #93c5fd; background: rgba(255, 255, 255, 0.03); }

    /* Sidebar and overlay */
    .sidebar-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 40;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .sidebar-overlay.show { opacity: 1; pointer-events: auto; }
    
    #sidebar {
      width: 320px !important;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-color) !important;
      transition: width 0.25s cubic-bezier(0.4, 0, 0.2, 1), padding 0.25s ease, transform 0.25s ease;
      overflow: hidden; white-space: nowrap;
    }
    #sidebar.hidden-sidebar {
      width: 0 !important; padding: 0; border: none !important; overflow: hidden; flex: 0 0 0;
    }
    #sidebar.mobile-sidebar {
      position: fixed; left: 0; top: 64px; bottom: 0; z-index: 45; width: 280px !important;
      transform: translateX(-100%); border-right: 1px solid var(--border-color) !important;
    }
    #sidebar.mobile-sidebar.show {
      transform: translateX(0);
    }

    /* Sidebar Member Items */
    .sidebar-member-item {
      padding: 14px 20px;
      margin: 4px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }
    .sidebar-member-item:hover {
      background: rgba(255, 255, 255, 0.04);
    }
    .sidebar-member-item.active {
      background: rgba(59, 130, 246, 0.1);
      border-color: rgba(59, 130, 246, 0.2);
    }
    .sidebar-member-item.active .member-name {
      color: #60a5fa;
    }

    /* Detail Card */
    #member-detail {
      background: rgba(15, 23, 42, 0.4);
      border-top: 1px solid var(--border-color) !important;
      padding: 24px;
    }
    .detail-title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }
    .detail-info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      font-size: 13px;
    }
    .detail-info-row:last-child {
      border-bottom: none;
    }
    .detail-label {
      color: #94a3b8;
      font-weight: 500;
    }
    .detail-value {
      color: #e2e8f0;
      font-weight: 600;
      text-align: right;
      max-width: 60%;
      word-break: break-word;
    }

    header {
      height: 64px;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
    }

    @media (max-width: 639px) {
      header { padding-left: 16px; padding-right: 16px; }
      #tree-container { min-height: calc(100vh - 64px); }
    }

    /* FAB */
    .fab { display: none; }
    @media (max-width: 639px) {
      .fab { display: flex; }
    }
    .fab-cond-btn {
      border: 1px solid rgba(255, 255, 255, 0.15); cursor: pointer; font-size: 11px; font-weight: 700;
      padding: 8px 16px; flex-shrink: 0; background: rgba(15, 23, 42, 0.8); color: #94a3b8;
      transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px;
      border-radius: 8px;
    }
    .fab-cond-btn:hover { background: rgba(255,255,255,0.05); color: #e2e8f0; border-color: #94a3b8; }
    .fab-cond-btn.danger:hover { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border-color: #ef4444; }
    .fab-cond-btn.edit { border-color: #f97316; color: #fb923c; }
    .fab-cond-btn.edit:hover { background: rgba(249, 115, 22, 0.15); color: #fdba74; border-color: #f97316; }
    .fab-toggle {
      width: 52px; height: 52px; background: #3b82f6; color: #fff;
      border: none; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: transform 0.2s;
      position: relative; z-index: 2;
      border-radius: 50%;
      box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
    }
    .fab-toggle svg { display: block; }
    .fab-toggle.open { transform: rotate(45deg); }
    .fab-actions {
      position: absolute; bottom: 64px; right: 0; display: flex; flex-direction: column;
      align-items: center; gap: 8px; opacity: 0; pointer-events: none; transform: translateY(10px);
      transition: opacity 0.2s, transform 0.2s;
    }
    .fab-actions.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .fab-action {
      width: 46px; height: 46px; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
      transition: transform 0.2s; color: #fff; font-weight: 700;
      border-radius: 50%;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
    }
    .fab-action:active { transform: scale(0.9); }
    .fab-action.add { background: #16a34a; }
    .fab-action.reset { background: #9333ea; }
    .fab-action.save { background: #2563eb; }
    .fab-backdrop {
      position: fixed; inset: 0; z-index: 49; background: rgba(0,0,0,0.4); display: none;
      backdrop-filter: blur(2px);
    }
    .fab-backdrop.show { display: block; }
    
    .searchable-select { position: relative; }
    .searchable-select input { cursor: pointer; }
    .searchable-select .ss-dropdown {
      position: absolute; top: 100%; left: 0; right: 0; z-index: 200;
      background: #0f172a; border: 1px solid rgba(255, 255, 255, 0.1);
      max-height: 200px; overflow-y: auto; display: none; margin-top: 4px;
      border-radius: 8px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }
    .searchable-select .ss-dropdown.show { display: block; }
    .searchable-select .ss-option {
      padding: 10px 14px; cursor: pointer; font-size: 13px; color: #cbd5e1; border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }
    .searchable-select .ss-option:last-child { border-bottom: none; }
    .searchable-select .ss-option:hover,
    .searchable-select .ss-option.highlighted { background: rgba(255, 255, 255, 0.05); color: #fff; }
    .searchable-select .ss-option.selected { color: #60a5fa; font-weight: 700; background: rgba(59, 130, 246, 0.1); }
    .searchable-select .ss-option.empty { color: #64748b; font-style: italic; cursor: default; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border: 2px solid #0f172a; border-radius: 4px; }
  </style>
</head>

  <div id="modal-area"></div>

  <div id="fab-backdrop" class="fab-backdrop"></div>
  <div id="fab-cond" style="position:fixed;bottom:20px;left:20px;display:flex;flex-direction:row;align-items:center;z-index:49;gap:6px;">
    <button id="fab-delete" class="fab-cond-btn danger" onclick="UI.confirmDeleteMember(UI.getActiveId())" title="Hapus" style="display:none">Hapus</button>

      <button class="fab-action save" onclick="UI.saveLocal()" title="Save">💾</button>
    </div>
    <button id="fab-toggle" class="fab-toggle"><svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><line x1="11" y1="2" x2="11" y2="20"/><line x1="2" y1="11" x2="20" y2="11"/></svg></button>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/crypto.js"></script>
  <script src="js/app.js"></script>
  <script src="js/tree.js"></script>
  <script>
    function __(key, ...args) {
      return I18n.t(key, ...args);
    }

    const UI = (() => {
      let activeMemberId = null;
      let searchTimeout = null;

      function init() {
        TreeVisualizer.init('tree-container', onTreeClick, onTreeContextMenu);
        sidebarVisible = window.innerWidth < 768 ? false : true;
        handleSidebarResize();
        updateFabActions();
        refreshUI();
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') { closeModal(); hideContextMenu(); }
        });
      }

      function onTreeContextMenu(id, event) {
        if (id) {
          const m = App.getMember(id);
          if (!m) return;
          showContextMenu(event.clientX, event.clientY, id, 'member');
        } else {
          showContextMenu(event.clientX, event.clientY, null, 'canvas');
        }
      }

      function showContextMenu(x, y, memberId, type) {
        hideContextMenu();
        const menu = document.createElement('div');
        menu.className = 'ctx-menu';
        menu.id = 'ctx-menu';
        menu.style.left = x + 'px';
        menu.style.top = y + 'px';

        if (type === 'member') {
          menu.innerHTML = `
            <div class="ctx-menu-item" data-action="edit">\u270E ${__('detail.edit')}</div>
            <div class="ctx-menu-sep"></div>
            <div class="ctx-menu-item danger" data-action="delete">\u2716 ${__('detail.delete')}</div>
          `;
          menu.querySelector('[data-action="edit"]').addEventListener('click', () => {
            hideContextMenu();
            editMember(memberId);
          });
          menu.querySelector('[data-action="delete"]').addEventListener('click', () => {
            hideContextMenu();
            confirmDeleteMember(memberId);
          });
        } else {
          menu.innerHTML = `
            <div class="ctx-menu-item" data-action="reset-layout">⟲ ${__('tree.resetLayout')}</div>
          `;
          menu.querySelector('[data-action="reset-layout"]').addEventListener('click', () => {
            hideContextMenu();
            resetLayout();
          });
        }

        document.body.appendChild(menu);

        const rect = menu.getBoundingClientRect();
        const maxX = window.innerWidth - rect.width - 4;
        const maxY = window.innerHeight - rect.height - 4;
        if (rect.left > maxX) menu.style.left = maxX + 'px';
        if (rect.top > maxY) menu.style.top = maxY + 'px';

        setTimeout(() => {
          document.addEventListener('click', hideContextMenu, { once: true });
        }, 0);
      }

      function hideContextMenu() {
        const menu = document.getElementById('ctx-menu');
        if (menu) menu.remove();
      }

      function refreshUI() {
        updateUI();
        updateSidebar();
        emptyDetail();
        updateFabActions();
        updateLangUI();
        const title = __('app.title');
        document.getElementById('page-title').textContent = title;
        document.getElementById('app-title').textContent = title;

      }

      function setActiveMember(id) {
        activeMemberId = id;
        TreeVisualizer.centerOn(id);
        updateSidebar();
        showDetail(id);
        updateFabActions();
        if (window.innerWidth < 768 && sidebarVisible) toggleSidebar();

      function updateFabActions() {
        const editBtn = document.getElementById('fab-edit');
        const deleteBtn = document.getElementById('fab-delete');
        if (!editBtn) return;
        const show = window.innerWidth < 768 && !sidebarVisible;
        editBtn.style.display = show ? 'inline-block' : 'none';

      function updateUI() {
        const members = App.getState().members;
        document.getElementById('member-count').textContent = __('app.members', members.length);
      }

      function updateSidebar() {
        renderMemberList(App.getState().members);
      }

      function renderMemberList(members) {
        const el = document.getElementById('search-results');
        if (!members.length) {
          el.innerHTML = `<div class="text-slate-500 text-sm text-center py-8 px-4 border border-dashed border-slate-700 rounded-lg mx-3">${__('search.noMembers')}</div>`;
          return;
        }
        const sorted = [...members].sort((a, b) =>
          (a.nama || '').localeCompare(b.nama || '')
        );
        el.innerHTML = sorted.map(m => {
          const isActive = m.id === activeMemberId;
          return `<div onclick="UI.setActiveMember('${m.id}')"
            class="sidebar-member-item ${isActive ? 'active' : ''}">
            <div class="font-medium text-slate-200 member-name">${escapeHtml(m.nama || __('search.unknown'))}</div>
            <div class="text-xs text-slate-500 mt-1">${m.tanggal_lahir || ''}${m.pekerjaan ? ' \u00b7 ' + escapeHtml(m.pekerjaan) : ''}</div>
          </div>`;
        }).join('');
      }

      function showDetail(id) {
        const el = document.getElementById('member-detail');
        const m = App.getMember(id);
        if (!m) {
          el.innerHTML = `<div class="text-slate-500 text-sm text-center py-6 border border-dashed border-slate-700 rounded-lg">${__('detail.empty')}</div>`;
          return;
        }
        const rel = App.getRelatives(id);
        const father = m.father_id ? App.getMember(m.father_id) : null;
        const mother = m.mother_id ? App.getMember(m.mother_id) : null;

        function formatRow(translationKey, value) {
          if (!value) return '';
          const text = __(translationKey, value);
          const parts = text.split(':');
          const label = parts[0].trim();
          const val = parts.slice(1).join(':').trim();
          return `<div class="detail-info-row"><span class="detail-label">${label}</span><span class="detail-value">${val}</span></div>`;
        }

        const rows = [
          formatRow('detail.birth', m.tanggal_lahir),
          formatRow('detail.work', escapeHtml(m.pekerjaan)),
          formatRow('detail.education', escapeHtml(m.pendidikan)),
          formatRow('detail.religion', escapeHtml(m.agama)),
          formatRow('detail.marital', escapeHtml(m.status_perkawinan)),
          formatRow('detail.hobby', escapeHtml(m.hobi)),
          formatRow('detail.father', father ? escapeHtml(father.nama) : null),
          formatRow('detail.mother', mother ? escapeHtml(mother.nama) : null),
          formatRow('detail.spouse', rel.spouse ? escapeHtml(rel.spouse.nama) : null),
          formatRow('detail.children', rel.children.length ? rel.children.map(c => escapeHtml(c.nama)).join(', ') : null)
        ].filter(Boolean).join('');

        el.innerHTML = `
          <div class="flex items-center justify-between mb-4 gap-2">
            <span class="detail-title truncate flex-1">${escapeHtml(m.nama)}</span>
            <div class="flex gap-1.5 flex-shrink-0">
              <button onclick="UI.editMember('${m.id}')" class="btn btn-ghost text-[11px] px-2.5 py-1.5">${__('detail.edit')}</button>
              <button onclick="UI.confirmDeleteMember('${m.id}')" class="btn btn-danger text-[11px] px-2.5 py-1.5">${__('detail.delete')}</button>
            </div>
          </div>
          <div class="space-y-0.5">
            ${rows}
            ${m.catatan ? `<div class="mt-3 text-xs italic text-slate-400 border-l-2 border-slate-600 pl-2 py-0.5">${escapeHtml(m.catatan)}</div>` : ''}
          </div>
        `;
      }

      function emptyDetail() {
        document.getElementById('member-detail').innerHTML =
          `<div class="text-slate-500 text-sm text-center py-6 border border-dashed border-slate-700 rounded-lg">${__('detail.empty')}</div>`;
      }

      function emptySearchResults() {
        renderMemberList(App.getState().members);

      function searchMembers(query) {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          if (!query.trim()) {
            updateSidebar();
            return;
          }
          const results = TreeVisualizer.searchMembers(query);
          renderMemberList(results);
        }, 200);
      }

      function newMember() {
        showModal(__('modal.add'), null, (formData) => {
          const m = App.addMember(formData);
          updateUI();
          updateSidebar();
          setActiveMember(m.id);
          return true;
        });
      }

      function editMember(id) {
        const m = App.getMember(id);
        if (!m) return;
        showModal(__('modal.edit'), m, (formData) => {
          App.updateMember(id, formData);
          updateUI();
          updateSidebar();
          setActiveMember(id);
          return true;
        });
      }

      function confirmDeleteMember(id) {
        const m = App.getMember(id);
        if (!m) return;
        showConfirm(__('confirm.deleteTitle', m.nama), () => {
          App.deleteMember(id);
          updateUI();
          updateSidebar();
          if (activeMemberId === id) {
            const all = App.getState().members;
            if (all.length) setActiveMember(all[0].id);
            else { activeMemberId = null; emptyDetail(); }
          }
          TreeVisualizer.refresh();
        });

      async function promptPassword(title, buttonLabel) {
        return new Promise((resolve) => {
          function cancel() { area.innerHTML = ''; resolve(null); }
          const html = `
            <div class="modal-overlay" id="pwd-overlay">
              <div class="modal-box">
                <h2 class="text-base font-bold text-white mb-4">${escapeHtml(title)}</h2>
                <input id="pwd-input" type="password" class="form-input mb-4" placeholder="${__('pwd.placeholder')}" autofocus>
                <div class="flex justify-end gap-2">
                  <button id="pwd-cancel" class="btn btn-ghost">${__('modal.cancel')}</button>
                  <button id="pwd-submit" class="btn btn-primary">${escapeHtml(buttonLabel)}</button>
                </div>
              </div>
            </div>
          `;
          const area = document.getElementById('modal-area');
          area.innerHTML = html;

          const doSubmit = () => {
            const password = document.getElementById('pwd-input').value;
            if (!password) { alert(__('pwd.required')); return; }
            area.innerHTML = '';
            resolve(password);
          };

          document.getElementById('pwd-submit').addEventListener('click', doSubmit);
          document.getElementById('pwd-cancel').addEventListener('click', cancel);
          document.getElementById('pwd-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doSubmit();
          });
          document.getElementById('pwd-overlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) cancel();
          });
        });
      }

      async function saveLocal() {
        if (!App.getState().members.length) {
          showError(__('error.emptyTree'));
          return;
        }
        const cached = App.getCachedPassword();
        const password = cached || await promptPassword(__('pwd.title.save'), __('header.save'));
        if (!password) return;
        try {
          await App.saveToLocal(password);
          showSuccess(__('success.saved'));
        } catch (e) {
          showError(__('error.exportFail', e.message));
        }
      }

      async function loadLocal() {
        if (!App.hasLocalData()) {
          showError('No saved data in browser storage.');
          return;
        }
        const password = await promptPassword(__('pwd.title.load'), __('header.load'));
        if (!password) return;
        try {
          await App.loadFromLocal(password);
          refreshUI();
          const members = App.getState().members;
          if (members.length) setActiveMember(members[0].id);
          showSuccess(__('success.loaded', App.getState().tree_name));
        } catch (err) {
          showError(err.message);
        }
      }

      async function exportFile() {
        if (!App.getState().members.length) {
          showError(__('error.emptyTree'));
          return;
        }
        const password = await promptPassword(__('pwd.title.export'), __('header.export'));
        if (!password) return;
        try {
          await App.exportFile(password);
          showSuccess(__('success.exported'));
        } catch (e) {
          showError(__('error.exportFail', e.message));
        }
      }

      async function importFile() {
        const password = await promptPassword(__('pwd.title.import'), __('header.import'));
        if (!password) return;
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.enc';
        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          try {
            await App.importFile(file, password);
            refreshUI();
            const members = App.getState().members;
            if (members.length) setActiveMember(members[0].id);
            showSuccess(__('success.imported', App.getState().tree_name));
          } catch (err) {
            showError(err.message);
          }
        };
        input.click();
      }

      async function mergeFile() {
        const password = await promptPassword(__('pwd.title.merge'), __('header.import'));
        if (!password) return;
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.enc';
        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          try {
            const result = await App.mergeFile(file, password);
            refreshUI();
            showSuccess(__('success.merged', result.mergedCount, result.mergedTree.tree_name));
            if (App.getState().members.length) setActiveMember(App.getState().members[0].id);
          } catch (err) {
            showError(err.message);
          }
        };
        input.click();
      }

        TreeVisualizer.resetPositions();

      let sidebarVisible = true;

      function toggleSidebar() {
        sidebarVisible = !sidebarVisible;
        const sb = document.getElementById('sidebar');
        const ov = document.getElementById('sidebar-overlay');
        const isMobile = window.innerWidth < 768;
        if (isMobile) {
          sb.classList.toggle('mobile-sidebar', true);
          sb.classList.toggle('show', sidebarVisible);
          ov.classList.toggle('show', sidebarVisible);
        } else {
          sb.classList.toggle('hidden-sidebar', !sidebarVisible);
        }
        updateFabActions();
      }

      function handleSidebarResize() {
        const sb = document.getElementById('sidebar');
        const ov = document.getElementById('sidebar-overlay');
        const isMobile = window.innerWidth < 768;
        if (isMobile) {
          sb.classList.remove('hidden-sidebar');
          sb.classList.add('mobile-sidebar');
          if (!sidebarVisible) sb.classList.remove('show');
        } else {
          sb.classList.remove('mobile-sidebar', 'show');
          ov.classList.remove('show');
          sb.classList.toggle('hidden-sidebar', !sidebarVisible);
        }
        updateFabActions();
      }

      function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      function createSearchableSelect(selectId) {
        const select = document.getElementById(selectId);
        if (!select) return;
        const opts = Array.from(select.options);
        select.style.display = 'none';

        const wrapper = document.createElement('div');
        wrapper.className = 'searchable-select';

        const input = document.createElement('input');
        input.className = 'form-input';
        input.type = 'text';
        input.autocomplete = 'off';
        input.readOnly = true;
        input.placeholder = opts[0] ? opts[0].text : '';

        const selectedOpt = opts.find(o => o.selected);
        if (selectedOpt && selectedOpt.value) {
          input.value = selectedOpt.text;
          input.dataset.value = selectedOpt.value;
        }

        const dropdown = document.createElement('div');
        dropdown.className = 'ss-dropdown';

        function renderOptions(filter) {
          const q = (filter || '').toLowerCase().trim();
          dropdown.innerHTML = '';
          let shown = 0;
          for (const o of opts) {
            if (!q || o.text.toLowerCase().includes(q)) {
              if (o.value || o.text !== '— None —') {
                const div = document.createElement('div');
                div.className = 'ss-option';
                if (o.selected && o.value) div.classList.add('selected');
                if (!o.value) div.classList.add('empty');
                div.textContent = o.text;
                div.dataset.value = o.value;
                div.addEventListener('click', () => {
                  select.value = o.value;
                  select.dispatchEvent(new Event('change', { bubbles: true }));
                  input.value = o.value ? o.text : '';
                  input.dataset.value = o.value || '';
                  input.readOnly = true;
                  dropdown.classList.remove('show');
                  opts.forEach(opt => opt.selected = opt.value === o.value);
                });
                dropdown.appendChild(div);
                shown++;
              }
            }
          }
          if (!shown) {
            const div = document.createElement('div');
            div.className = 'ss-option empty';
            div.textContent = '—';
            dropdown.appendChild(div);
          }
        }

        renderOptions('');

        input.addEventListener('focus', () => {
          input.readOnly = false;
          input.value = '';
          dropdown.classList.add('show');
          renderOptions('');
        });

        input.addEventListener('input', () => {
          dropdown.classList.add('show');
          renderOptions(input.value);
        });

        input.addEventListener('blur', () => {
          setTimeout(() => {
            dropdown.classList.remove('show');
            if (!input.dataset.value) {
              input.value = '';
              select.value = '';
            } else {
              const opt = opts.find(o => o.value === input.dataset.value);
              if (opt) input.value = opt.text;
            }
            input.readOnly = true;
          }, 200);
        });

        input.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') {
            dropdown.classList.remove('show');
            input.blur();
          }
          if (e.key === 'Enter') {
            const vis = dropdown.querySelectorAll('.ss-option:not(.empty)');
            if (vis.length === 1) {
              vis[0].click();
            }
          }
        });

        select.addEventListener('change', () => {
          const opt = opts.find(o => o.value === select.value);
          if (opt) {
            input.value = opt.value ? opt.text : '';
            input.dataset.value = opt.value || '';
          }
        });

        wrapper.appendChild(input);
        wrapper.appendChild(dropdown);
        select.parentNode.insertBefore(wrapper, select.nextSibling);
      }

      function toggleHeaderDropdown() {
        const dd = document.getElementById('header-dropdown-menu');
        if (!dd) return;
        const shown = dd.style.display === 'block';
        dd.style.display = shown ? 'none' : 'block';
        if (!shown) {
          const closer = (e) => {
            if (!e.target.closest('#header-dropdown-wrapper')) {
              dd.style.display = 'none';
              document.removeEventListener('click', closer);
            }
          };
          setTimeout(() => document.addEventListener('click', closer), 0);
        }
      }

      document.getElementById('sidebar-toggle').addEventListener('click', toggleSidebar);
      window.addEventListener('resize', handleSidebarResize);
      document.getElementById('header-dropdown-toggle').addEventListener('click', toggleHeaderDropdown);

      const fabToggle = document.getElementById('fab-toggle');
      const fabActions = document.getElementById('fab-actions');
      const fabBackdrop = document.getElementById('fab-backdrop');
      if (fabToggle) {
        fabToggle.addEventListener('click', () => {
          const open = fabActions.classList.toggle('open');
          fabToggle.classList.toggle('open', open);
          fabBackdrop.classList.toggle('show', open);
        });
        fabBackdrop.addEventListener('click', () => {
          fabActions.classList.remove('open');
          fabToggle.classList.remove('open');
          fabBackdrop.classList.remove('show');
        });
        document.getElementById('fab').querySelectorAll('.fab-action').forEach(btn => {
          btn.addEventListener('click', () => {
            fabActions.classList.remove('open');
            fabToggle.classList.remove('open');
            fabBackdrop.classList.remove('show');
          });
        });
      }

      function getActiveId() { return activeMemberId; }

      return {
        init, refreshUI, setActiveMember, newMember, editMember, confirmDeleteMember,
        searchMembers, saveLocal, loadLocal, exportFile, importFile, mergeFile, newTree,
        resetLayout, closeModal, toggleSidebar, getActiveId
      };
    })();

      const ddActions = {
        'add': () => UI.newMember(),
        'save': () => UI.saveLocal(),
        'load': () => UI.loadLocal(),
        'export': () => UI.exportFile(),
        'import': () => UI.importFile(),
        'merge': () => UI.mergeFile(),
        'sidebar': () => UI.toggleSidebar(),
        'reset': () => UI.resetLayout(),
        'lang-en': () => { I18n.setLang('en'); UI.refreshUI(); },
        'lang-id': () => { I18n.setLang('id'); UI.refreshUI(); },
        'new': () => UI.newTree(),
      };
      const dd = document.getElementById('header-dropdown-menu');
      for (const [action, fn] of Object.entries(ddActions)) {
        const el = dd.querySelector(`[data-action="${action}"]`);
        if (el) el.addEventListener('click', () => { dd.style.display = 'none'; fn(); });
      }

      document.addEventListener('DOMContentLoaded', () => {
        UI.init();
      });
  </script>
</body>
</html>
