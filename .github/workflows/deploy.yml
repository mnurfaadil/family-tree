name: Deploy to GitHub Pages

on:
  # Berjalan otomatis setiap ada perubahan (push) di branch main
  push:
    branches: ["main"]

  # Mengizinkan jalankan CI secara manual dari tab Actions di GitHub
  workflow_dispatch:

# Mengatur izin GITHUB_TOKEN untuk mengizinkan deployment ke GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Mencegah deployment ganda berjalan bersamaan
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies & build CSS
        run: npm ci && npm run build

      - name: Upload Static Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4